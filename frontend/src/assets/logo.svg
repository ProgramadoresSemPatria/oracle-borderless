<svg viewBox="0 0 1080 1080" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Oracle Borderless">
  <defs>
    <!-- Cada fita vai de violeta (topo) a esmeralda (base), como na logo. -->
    <linearGradient id="ribbon" gradientUnits="userSpaceOnUse" x1="540" y1="330" x2="540" y2="772">
      <stop offset="0" stop-color="#6B34F0"/>
      <stop offset="0.42" stop-color="#5B2CE6"/>
      <stop offset="0.62" stop-color="#3AA9C9"/>
      <stop offset="1" stop-color="#2FDBA2"/>
    </linearGradient>
  </defs>

  <!-- Fundo quadrado escuro -->
  <rect width="1080" height="1080" fill="#0B0B0D"/>

  <!-- Duas fitas espelhadas: verticais no topo/base + cruzamento no centro (entrelaçado) -->
  <g fill="none" stroke="url(#ribbon)" stroke-width="150" stroke-linecap="round" stroke-linejoin="round">
    <path d="M408 344 V472 L672 608 V756"/>
    <path d="M672 344 V472 L408 608 V756"/>
  </g>
</svg>

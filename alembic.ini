# Configuração do Alembic — Oracle Borderless
[alembic]
# Localização dos scripts (env.py, script.py.mako) e das migrations.
script_location = database
version_locations = %(here)s/database/migrations/versions

# Formato dos arquivos de migration: YYYY_MM_DD_HHMMSS-{rev}_{descrição}.py
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d%%(second).2d-%%(rev)s_%%(slug)s

# A URL vem das settings em database/env.py (não fixamos aqui).
sqlalchemy.url =

prepend_sys_path = .
path_separator = os

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
